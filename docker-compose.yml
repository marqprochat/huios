services:
  db:
    image: postgres:15-alpine
    container_name: huios-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./huios-api
      dockerfile: Dockerfile
    container_name: huios-api
    restart: always
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: "huios-secret-key-change-in-production"
      FRONTEND_URL: "http://${DOMAIN}:3000"
      PORT: 3001
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3001/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  admin:
    build:
      context: ./huios-admin
      dockerfile: Dockerfile.prod
    container_name: huios-admin
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      INTERNAL_API_URL: "http://api:3001/api"
      NEXT_PUBLIC_API_URL: "http://${DOMAIN}:3001/api"
      JWT_SECRET: "huios-secret-key-change-in-production"
    depends_on:
      api:
        condition: service_healthy
      db:
        condition: service_healthy
    volumes:
      - ./huios-admin/public/uploads:/app/public/uploads

volumes:
  postgres_data:
  uploads_data:
