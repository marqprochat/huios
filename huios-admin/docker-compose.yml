version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: huios_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Pass the database connection URL at build-time for Prisma client generation
        DATABASE_URL: "postgresql://postgres:postgrespassword@db:5432/huios_dev?schema=public"
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/huios_dev?schema=public
    volumes:
      - ./public/uploads:/app/public/uploads
    depends_on:
      - db

volumes:
  postgres_data:
